<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1b1028">
  <title>For You</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell" aria-live="polite">
    <section class="screen screen-one is-active" id="screen-one" data-screen="1" aria-label="Memory board">
      <div class="stars" aria-hidden="true"></div>
      <header class="screen-heading">
        <p class="eyebrow">Happy monthsary Yeobo</p>
        <h1>For You</h1>
      </header>

      <div class="memory-board is-locked" id="memory-board" aria-label="Draggable memories"></div>

      <article class="opening-letter" id="opening-letter" tabindex="0" aria-label="Opening letter">
        <span class="paper-tape"></span>
        <p class="letter-kicker">Drag Me</p>
        <h2 id="opening-letter-title">Before you look around</h2>
        <p id="opening-letter-body"></p>
        <p class="letter-hint">Swipe or drag this letter aside.</p>
      </article>

      <nav class="bottom-nav">
        <button class="primary-button" id="to-story" type="button">Continue</button>
      </nav>
    </section>

    <section class="screen screen-two" id="screen-two" data-screen="2" aria-label="Story cards">
      <div class="stars" aria-hidden="true"></div>
      <header class="screen-heading compact">
        <p class="eyebrow">small pieces of us</p>
        <h2>Story</h2>
      </header>

      <div class="story-carousel" id="story-carousel" tabindex="0" aria-label="Swipeable story cards"></div>

      <nav class="bottom-nav split">
        <button class="ghost-button" data-go="1" type="button">Back</button>
        <button class="primary-button" id="to-final" data-go="3" type="button">Continue</button>
      </nav>
    </section>

    <section class="screen screen-three" id="screen-three" data-screen="3" aria-label="Final letter">
      <div class="stars" aria-hidden="true"></div>
      <header class="screen-heading compact">
        <p class="eyebrow">one last thing</p>
        <h2>Open Me</h2>
      </header>

      <div class="final-stage">
        <button class="envelope" id="final-envelope" type="button" aria-expanded="false">
          <span class="envelope-flap"></span>
          <span class="envelope-body">Open Me</span>
        </button>

        <article class="final-letter" id="final-letter" aria-hidden="true">
          <span class="paper-tape"></span>
          <h2 id="final-letter-title">A small voice note</h2>
          <p id="final-letter-body"></p>
          <div class="audio-panel">
            <span class="audio-label">Voice Note</span>
            <div class="audio-actions">
              <button class="icon-button" id="final-audio-toggle" type="button" aria-label="Play or pause final voice note">Play</button>
              <button class="icon-button" id="final-audio-replay" type="button" aria-label="Replay final voice note">Replay</button>
              <div class="final-photo-stack" id="final-photo-stack" aria-label="Final photo memories"></div>
            </div>
          </div>
        </article>
      </div>

      <nav class="bottom-nav">
        <button class="ghost-button" data-go="2" type="button">Back</button>
      </nav>
    </section>
  </main>

  <div class="media-viewer" id="media-viewer" aria-hidden="true">
    <div class="viewer-backdrop" data-close-viewer></div>
    <section class="viewer-card" role="dialog" aria-modal="true" aria-label="Memory preview">
      <button class="close-button" type="button" data-close-viewer aria-label="Close preview">Close</button>
      <div class="viewer-media" id="viewer-media"></div>
      <p class="viewer-caption" id="viewer-caption"></p>
      <div class="viewer-controls">
        <button class="icon-button" id="viewer-prev" type="button">Prev</button>
        <button class="icon-button" id="viewer-toggle" type="button">Play</button>
        <button class="icon-button" id="viewer-replay" type="button">Replay</button>
        <button class="icon-button" id="viewer-next" type="button">Next</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
